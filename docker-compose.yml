services:
  postgres:
    image: postgres:18
    container_name: person-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: person_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d person_tracker"]
      interval: 5s
      timeout: 2s
      retries: 20

volumes:
  postgres_data: